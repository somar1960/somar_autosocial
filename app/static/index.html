<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SOMAR AutoSocial</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="dark-mode">
    <div id="app">
        <!-- شاشة تسجيل الدخول -->
        <div id="login-screen" class="screen center-screen">
            <div class="login-box">
                <h1 class="gold-text">SOMAR</h1>
                <h2 class="gold-text">AutoSocial</h2>
                <input type="password" id="password" placeholder="كلمة المرور" autofocus>
                <button class="btn-gold" onclick="login()">دخول</button>
                <p id="login-error" class="error-text"></p>
            </div>
        </div>

        <!-- الشاشة الرئيسية -->
        <div id="main-screen" class="screen hidden">
            <div id="tab-content" class="tab-content"></div>
            <nav class="bottom-nav">
                <button class="nav-btn active" data-tab="home"><i class="fas fa-home"></i><span>الرئيسية</span></button>
                <button class="nav-btn" data-tab="upload"><i class="fas fa-cloud-upload-alt"></i><span>رفع</span></button>
                <button class="nav-btn" data-tab="schedule"><i class="fas fa-calendar-alt"></i><span>الجدول</span></button>
                <button class="nav-btn" data-tab="analytics"><i class="fas fa-chart-bar"></i><span>تحليلات</span></button>
            </nav>
        </div>
    </div>
    <script src="/script.js"></script>
</body>
</html>
